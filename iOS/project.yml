name: Campacklist
options:
  bundleIdPrefix: com.shimondeitel.campacklist
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Campacklist:
    type: application
    platform: iOS
    sources:
      - path: Campacklist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.campacklist
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Campacklist/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CampacklistTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CampacklistTests
      - path: Campacklist.storekit
    dependencies:
      - target: Campacklist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.campacklist.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CampacklistUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CampacklistUITests
    dependencies:
      - target: Campacklist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.campacklist.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Campacklist:
    build:
      targets:
        Campacklist: all
        CampacklistTests: [test]
        CampacklistUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Campacklist.storekit
    test:
      config: Debug
      storeKitConfiguration: Campacklist.storekit
      targets:
        - CampacklistTests
        - CampacklistUITests
    archive:
      config: Release
